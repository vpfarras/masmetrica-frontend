name: Deploy Frontend to Google Cloud Storage

on:
  push:
    branches:
      - main  # Esto hace que se ejecute al subir a la rama main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build Angular
      run: npm run build -- --prod --base-href ./
      env:
        NODE_OPTIONS: "--openssl-legacy-provider"

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Upload to Cloud Storage
      uses: google-github-actions/upload-cloud-storage@v1
      with:
        path: dist/login  # Asegúrate de que este sea el nombre de tu carpeta de salida
        destination: masmetrica-frontend
        parent: false