<div class="mm-auth single">
  <div class="mm-auth__panel">
    <div class="mm-auth__card text-center">
      <div class="mm-auth__header">
        <h2 class="mm-auth__title">Cambiar Contraseña</h2>
        <p class="mm-auth__subtitle">Ingresa tu nueva contraseña para acceder a tu cuenta.</p>
      </div>

      <form [formGroup]="userForm.passwordForm" *ngIf="dataLoaded" (ngSubmit)="savePassword()">
        <div class="mm-field-group">
          <label>Nueva Contraseña</label>
          <div class="mm-input-wrapper">
            <mat-icon class="prefix-icon">lock_outline</mat-icon>
            <input type="password" formControlName="newPassword" placeholder="Mínimo 8 caracteres" required />
          </div>
          <mat-error *ngIf="checkFieldPassword('newPassword')" class="mm-error">
            {{ userForm.errorMessage }}
          </mat-error>
          <mat-error *ngIf="!coinciden" class="mm-error">
            Las contraseñas no coinciden
          </mat-error>
        </div>

        <div class="mm-field-group" style="margin-bottom: 32px">
          <label>Confirmar Contraseña</label>
          <div class="mm-input-wrapper">
            <mat-icon class="prefix-icon">lock_outline</mat-icon>
            <input type="password" formControlName="confirmNewPassword" placeholder="Repite la nueva contraseña"
              required />
          </div>
        </div>


        <button type="submit" class="mm-btn mm-btn--primary mm-btn--full"
          [disabled]="userForm.passwordForm.get('newPassword').invalid || 
                      userForm.passwordForm.get('confirmNewPassword').invalid || 
                      userForm.passwordForm.get('newPassword').value !== userForm.passwordForm.get('confirmNewPassword').value">
          Cambiar Contraseña
        </button>
      </form>
    </div>
  </div>
</div>
