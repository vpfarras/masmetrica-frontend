
<form [formGroup]="userForm.passwordForm" *ngIf="dataLoaded">
  <div>
    <mat-form-field class="full-width-input">
      <input
        type="password"
        formControlName="newPassword"
        matInput
        placeholder="Nueva Contraseña"
        required 
        class="inputTxt"
      />
      <mat-error *ngIf="checkFieldPassword('newPassword')">
        {{ userForm.errorMessage }}
      </mat-error>
      <mat-error *ngIf="!coinciden">
        Las contraseñas no coinciden
      </mat-error>
    </mat-form-field>
  </div>
  <div>
    <mat-form-field class="full-width-input">
      <input
        type="password"
        formControlName="confirmNewPassword"
        matInput
        placeholder="Confirmar contraseña Contraseña"
        required 
        class="inputTxt"
      />
    </mat-form-field>
  </div>
  
  <button
    mat-raised-button
    [mat-dialog-close]="true"
    color="primary"
    (click)="savePassword()"
    ckdFocusInitial
    class="mat-raised-button"
  >
  
    Cambiar Contraseña
  </button>
</form>
