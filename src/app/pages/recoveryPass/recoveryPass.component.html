<div class="mm-auth">

  <!-- Imagen izquierda -->
  <div class="mm-auth__media"></div>

  <!-- Panel derecho -->
  <div class="mm-auth__panel">
    <div class="mm-auth__card">

      <!-- ===== Estado: formulario ===== -->
      <ng-container *ngIf="!isSending">

        <h1 class="mm-auth__title">Recuperar contraseña</h1>
        <p class="mm-auth__subtitle">
          Introduce tu email y te enviaremos las instrucciones para recuperar tu contraseña.
        </p>

        <form [formGroup]="userForm.recoveryPasswordForm" (ngSubmit)="sendEmail()">

          <div class="mm-field-group">
            <label>Email *</label>
            <div class="mm-input-wrapper">
              <mat-icon class="prefix-icon">mail_outline</mat-icon>
              <input type="email" formControlName="username" placeholder="usuario@email.com" required />
            </div>
            <mat-error *ngIf="checkFieldEmail('username')" class="mm-error">
              {{ userForm.errorMessage }}
            </mat-error>
          </div>

          <button type="submit" class="mm-btn mm-btn--primary mm-btn--full"
            [disabled]="userForm.recoveryPasswordForm.invalid">
            Enviar instrucciones
          </button>

          <div class="mm-auth__bottom">
            ¿Te acordaste?
            <a class="mm-link mm-link-blue" (click)="goToLogin()">
              Volver al login
            </a>
          </div>

        </form>
      </ng-container>

      <!-- ===== Estado: enviado ===== -->
      <ng-container *ngIf="isSending">
        <h1 class="mm-auth__title">Email enviado</h1>
        <p class="mm-auth__subtitle">
          Te hemos enviado un email con las instrucciones para recuperar tu contraseña.
        </p>

        <button type="button" class="mm-btn mm-btn--primary mm-btn--full" (click)="goToLogin()">
          Volver al login
        </button>
      </ng-container>

    </div>
  </div>
</div>
