<div class="login-form">
  <mat-card>
    <mat-card-content>
      <h1>LOGIN</h1>
      <form [formGroup]="loginForm.baseFormLogin" (ngSubmit)="onLogin()">        
        <mat-form-field class="full-width-input">
          <label>Usuario:</label>
          <input
            text="text"
            formControlName="username"
            matInput
            placeholder="Usuario"
            required
          />
          <mat-error *ngIf="checkField('username')">
            Error en el campo username
          </mat-error>
        </mat-form-field>
        <mat-form-field class="full-width-input separator">
          <label>Password:</label>
          <input
            [type]="hide ? 'password' : 'text'"
            formControlName="password"
            matInput
            placeholder="Password"
            required
          />
          <button mat-icon-button matSuffix (click)="hide = !hide">
            <mat-icon>{{ hide ? "visibility_off" : "visibility" }}</mat-icon>
          </button>
          <mat-error *ngIf="checkField('password')">
            {{ loginForm.errorMessage }}
          </mat-error>
        </mat-form-field>.
        <button
          [disabled]="loginForm.baseFormLogin.invalid"
          type="submit"
          mat-raised-button
          color="primary"
        >
          Login
        </button>
      </form>
    </mat-card-content>
    <p (click)="goToRecoverPassword()">¿Olvidaste tu contraseña?</p>
        <p>¿ Aún no tienes usuario ? <span (click)="goToRegister()">Regístrate</span></p>
  </mat-card>
</div>
